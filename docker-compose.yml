services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: scrw
      POSTGRES_PASSWORD: scrw
      POSTGRES_DB: scrw
    volumes:
      - scrw_pg:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scrw -d scrw"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://scrw:scrw@db:5432/scrw?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      PORT: "4000"
      CORS_ORIGIN: http://localhost:8080
      UPLOAD_DIR: /data/uploads
      NODE_ENV: production
    volumes:
      - scrw_uploads:/data/uploads
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  scrw_pg:
  scrw_uploads:
